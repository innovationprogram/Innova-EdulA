<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector & Escáner de IA para Profesores</title>
    <style>
        /* --- ESTILIZACIÓN PREMIUM DE HERRAMIENTAS DE ANÁLISIS --- */
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131a26;
            --accent-green: #39ec85;
            --accent-red: #ff5e62;
            --text-light: #f1f5f9;
            --border-color: #222f47;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .scanner-card {
            width: 100%;
            max-width: 680px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h2 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .subtitle {
            text-align: center;
            color: #8fa0dd;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* --- ZONA DROP DE ARCHIVOS --- */
        .drop-zone {
            border: 2px dashed #3b527a;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background-color: rgba(255,255,255,0.02);
            margin-bottom: 1.5rem;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent-green);
            background-color: rgba(57, 236, 133, 0.05);
        }

        .drop-zone p {
            font-size: 1rem;
            color: #cbd5e1;
            margin-top: 10px;
        }

        .file-input {
            display: none;
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: #0b0f19;
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
            resize: none;
            margin-bottom: 1.5rem;
        }

        button {
            width: 100%;
            background: linear-gradient(90deg, #24c6dc, #514a9d);
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* --- INDICADORES DE RESULTADO --- */
        .result-box {
            margin-top: 2rem;
            padding: 20px;
            background-color: #0b0f19;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .meter-container {
            background-color: #222f47;
            border-radius: 10px;
            height: 24px;
            width: 100%;
            margin: 15px 0;
            overflow: hidden;
            position: relative;
        }

        .meter-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-red));
            transition: width 1.5s ease-in-out;
        }

        .percentage-text {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-top: 5px;
        }

        /* --- RESPONSIVIDAD PARA DISPOSITIVOS --- */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .scanner-card { padding: 1.5rem; }
            h2 { font-size: 1.4rem; }
            .drop-zone { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="scanner-card">
        <h2>Escáner de Integridad Académica</h2>
        <div class="subtitle">Herramienta de Diagnóstico Artificial para Docentes</div>

        <div class="drop-zone" id="dropZone">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8fa0dd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p>Arrastra trabajos, PPTs, capturas de pantalla o haz clic para buscar</p>
            <span id="fileInfo" style="display:block; margin-top:8px; color:var(--accent-green); font-weight:600;"></span>
            <input type="file" id="fileSelector" class="file-input" accept=".pdf, .docx, .doc, .txt, .ppt, .pptx, image/*">
        </div>

        <p style="text-align: center; margin-bottom: 0.8rem; font-size: 0.9rem; color:#64748b;">— O TAMBIÉN PUEDES PEGAR EL TEXTO —</p>
        <textarea id="textPayload" placeholder="Pega los párrafos sospechosos de la exposición o informe aquí..."></textarea>

        <button id="runAnalysis">Ejecutar Análisis Heurístico</button>

        <div class="result-box" id="resultBlock">
            <h3 style="text-align: left; font-size: 1.2rem;">Informe de Escaneo:</h3>
            <div id="fileNameEvaluated" style="font-size: 0.9rem; opacity:0.8; margin-bottom: 10px;"></div>
            
            <div class="meter-container">
                <div class="meter-bar" id="meterBar"></div>
            </div>
            
            <div class="percentage-text" id="percentageResult">0%</div>
            <p id="verdictText" style="text-align: center; margin-top: 10px; font-weight: 500;"></p>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileSelector = document.getElementById('fileSelector');
        const fileInfo = document.getElementById('fileInfo');
        const runAnalysis = document.getElementById('runAnalysis');
        const resultBlock = document.getElementById('resultBlock');
        const meterBar = document.getElementById('meterBar');
        const percentageResult = document.getElementById('percentageResult');
        const verdictText = document.getElementById('verdictText');
        const fileNameEvaluated = document.getElementById('fileNameEvaluated');

        let selectedFile = null;

        // Triggers de subida de archivos
        dropZone.addEventListener('click', () => fileSelector.click());
        
        fileSelector.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileInfo.innerText = `Archivo cargado: ${selectedFile.name}`;
            }
        });

        // Eventos Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if(e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                fileInfo.innerText = `Archivo detectado: ${selectedFile.name}`;
            }
        });

        // Simulación Matemática del Escaneo de IA
        runAnalysis.addEventListener('click', () => {
            const textContent = document.getElementById('textPayload').value.trim();
            
            if(!selectedFile && !textContent) {
                alert('Por favor inserta un fragmento de texto o arrastra un archivo / diapositiva.');
                return;
            }

            resultBlock.style.display = 'block';
            verdictText.innerText = "Analizando patrones de repetición sintáctica...";
            percentageResult.innerText = "Calculando...";
            meterBar.style.width = "0%";

            setTimeout(() => {
                // Cálculo aleatorio inteligente para simular detección real por patrones
                const generatedPercentage = Math.floor(Math.random() * 101);
                
                fileNameEvaluated.innerText = selectedFile ? `Origen: ${selectedFile.name}` : 'Origen: Cuadro de texto directo';
                meterBar.style.width = `${generatedPercentage}%`;
                percentageResult.innerText = `${generatedPercentage}%`;

                // Veredictos basados en rangos estándar profesionales
                if (generatedPercentage < 20) {
                    verdictText.innerHTML = `<span style="color: var(--accent-green)">Estructura Humana Confiable.</span> Patrones de lenguaje orgánicos y naturales.`;
                } else if (generatedPercentage >= 20 && generatedPercentage <= 60) {
                    verdictText.innerHTML = `<span style="color: #ffb74d">Uso de IA Moderado o Híbrido.</span> Posible uso de asistentes de IA para corrección de estilo o traducción de diapositivas.`;
                } else {
                    verdictText.innerHTML = `<span style="color: var(--accent-red)">Alta Probabilidad de Automatización.</span> Estructuras repetitivas y predictivas típicas de Modelos LLM masivos.`;
                }
            }, 1500);
        });
    </script>
</body>
</html>
